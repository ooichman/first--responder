apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  labels:
    app: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
      containers:
        - name: vllm-engine
          image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "Qwen/Qwen2.5-1.5B-Instruct"
            - "--max-model-len"
            - "2048"
            - "--port"
            - "8000"
            - "--tensor-parallel-size"
            - "1"
            - "--gpu-memory-utilization"
            - "0.7"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes"
          env:
            - name: VLLM_TARGET_DEVICE
              value: "cpu"
            - name: VLLM_USE_V1
              value: "0"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: "6Gi"
            limits:
              cpu: "6"
              memory: "12Gi"
          volumeMounts:
            - mountPath: /root/.cache/huggingface
              name: cache-volume
            - mountPath: /dev/shm
              name: dshm
